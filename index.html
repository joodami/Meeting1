<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบตอบรับเข้าร่วมพิธีเปิด</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts (Sarabun) ฟอนต์สารบรรณเพื่อความเป็นทางการสูงสุด -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark-red: #8B0000; /* สีแดงเข้ม / สีเลือดหมูราชการ */
            --accent-gold: #D4AF37;       /* สีทองพรีเมียม */
            --light-gold: #F9F5E8;        /* สีทองอ่อนสำหรับพื้นหลังเบาๆ */
            --dark-text: #2B2B2B;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f7f5f2; /* พื้นหลังโทนอุ่นนวลตา */
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 24px 0;
        }
        
        .form-card {
            background: #ffffff;
            border: none;
            border-top: 5px solid var(--primary-dark-red); /* แถบสีแดงเข้มด้านบนเพิ่มความภูมิฐาน */
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(139, 0, 0, 0.06);
            padding: 2.8rem;
        }
        
        .form-header {
            padding-bottom: 1.5rem;
            margin-bottom: 2.2rem;
            position: relative;
        }
        
        /* เส้นใต้หัวข้อสีทองสไตล์เป็นทางการ */
        .form-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background-color: var(--accent-gold);
            border-radius: 2px;
        }
        
        .form-label {
            font-weight: 600;
            color: #4A4A4A;
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }
        
        /* ปรับแต่งช่องกรอกข้อมูลให้คมชัดและรองรับมือถือ */
        .form-control {
            border-radius: 6px;
            padding: 0.8rem 1rem;
            border: 1px solid #cccccc;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            color: var(--dark-text);
        }
        
        .form-control:focus {
            border-color: var(--primary-dark-red);
            box-shadow: 0 0 0 0.25rem rgba(139, 0, 0, 0.12);
        }
        
        .input-group-text {
            border-color: #cccccc;
            color: #666666;
            padding-left: 1.2rem;
            padding-right: 1.2rem;
        }
        
        /* ปุ่มส่งข้อมูลสีแดงเข้ม-ขอบทองหรูหรา */
        .btn-submit {
            background-color: var(--primary-dark-red);
            border: 1px solid var(--primary-dark-red);
            color: #ffffff;
            padding: 0.95rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .btn-submit:hover, .btn-submit:focus {
            background-color: #660000;
            border-color: #660000;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(102, 0, 0, 0.2);
        }
        
        /* สไตล์หน้าต่างแจ้งเตือน (Modal) */
        .modal-content {
            border: none;
            border-top: 5px solid var(--accent-gold); /* ด้านบนของ Modal เป็นแถบสีทอง */
            border-radius: 12px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
        }
        
        .modal-icon-success {
            font-size: 4.2rem;
            color: var(--primary-dark-red); /* ไอคอนความสำเร็จสีแดงเข้ม */
            margin-bottom: 1rem;
        }
        
        .modal-icon-error {
            font-size: 4.2rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        
        /* กล่องสรุปผลสีทองอ่อน ขอบทองเข้ม อ่านง่ายบนมือถือ */
        .summary-box {
            background-color: var(--light-gold);
            border-left: 4px solid var(--accent-gold);
            border-radius: 4px;
            padding: 1.2rem;
            font-size: 1rem;
        }
        
        .summary-box strong {
            color: var(--primary-dark-red);
        }

        /* คลาสควบคุมการตัดคำขึ้นบรรทัดใหม่เฉพาะบนมือถือ */
        .mobile-br {
            display: none;
        }
        
        /* Responsive สำหรับมือถือ */
        @media (max-width: 576px) {
            body {
                padding: 12px 0;
            }
            .form-card {
                padding: 2rem 1.2rem;
                border-radius: 8px;
            }
            .form-header h2 {
                font-size: 1.45rem;
            }
            .form-header p {
                font-size: 0.95rem !important;
                line-height: 1.6;
            }
            .form-label {
                font-size: 1rem;
            }
            .form-control {
                padding: 0.75rem 0.9rem;
            }
            .btn-submit {
                font-size: 1rem;
                padding: 0.85rem;
            }
            /* เปิดให้แท็ก <br> ทำงานเฉพาะบนจอมือถือ */
            .mobile-br {
                display: inline;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            
            <!-- การ์ดแบบฟอร์มบันทึกข้อมูล -->
            <div class="form-card">
                <div class="form-header text-center">
                    <!-- หัวข้อหลัก -->
                    <h2 class="fw-bold mb-3" style="color: var(--primary-dark-red);">
                        <i class="fa-solid fa-file-signature me-2"></i>แบบตอบรับเข้าร่วมพิธีเปิด
                    </h2>
                    
                    <!-- ส่วนข้อความย่อยที่บังคับตัดบรรทัดให้สวยงามในมือถือด้วยคลาส mobile-br -->
                    <p class="fw-semibold text-secondary mb-0" style="font-size: 1.05rem; letter-spacing: 0.2px;">
                        การแข่งขันประกวดสุนทรพจน์<br class="mobile-br">และความรู้ภาษาจีน “สะพานสู่ภาษาจีน”
                    </p>
                    <p class="text-muted mt-2 mb-0" style="font-size: 0.95rem;">
                        วันเสาร์ ที่ 20 มิถุนายน 2569<br class="mobile-br"><span class="d-none d-sm-inline"> ณ </span>โรงเรียนพิมานพิทยาสรรค์
                    </p>
                </div>

                <!-- ฟอร์มกรอกข้อมูล -->
                <form id="registrationForm" class="needs-validation" novalidate>
                    
                    <!-- ช่องกรอก: โรงเรียน/หน่วยงาน -->
                    <div class="mb-3">
                        <label for="school" class="form-label">โรงเรียน / หน่วยงาน</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-school text-secondary"></i></span>
                            <input type="text" class="form-control" id="school" placeholder="ระบุชื่อโรงเรียน หรือหน่วยงานของท่าน" required>
                        </div>
                        <div class="invalid-feedback">กรุณาระบุชื่อโรงเรียน หรือหน่วยงาน</div>
                    </div>

                    <!-- ช่องกรอก: ชื่อ-นามสกุล -->
                    <div class="mb-3">
                        <label for="name" class="form-label">ชื่อ - นามสกุล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-user text-secondary"></i></span>
                            <input type="text" class="form-control" id="name" placeholder="ระบุชื่อและนามสกุล" required>
                        </div>
                        <div class="invalid-feedback">กรุณาระบุชื่อและนามสกุลของท่าน</div>
                    </div>

                    <!-- ช่องกรอก: ตำแหน่ง -->
                    <div class="mb-4">
                        <label for="position" class="form-label">ตำแหน่ง</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-user-tie text-secondary"></i></span>
                            <input type="text" class="form-control" id="position" placeholder="ระบุตำแหน่งหน้าที่การงาน" required>
                        </div>
                        <div class="invalid-feedback">กรุณาระบุตำแหน่งหน้าที่การงาน</div>
                    </div>

                    <!-- ปุ่มส่งข้อมูล -->
                    <button type="submit" class="btn btn-submit w-100 shadow-sm" id="submitBtn">
                        <i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- Modal หน้าต่างป๊อปอัพแจ้งสถานะการบันทึก -->
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center p-4">
                
                <!-- ตัวสลับไอคอนผ่านสคริปต์ -->
                <div id="modalIcon"></div>
                
                <!-- ข้อความหัวข้อและรายละเอียด -->
                <h4 id="modalTitle" class="fw-bold"></h4>
                <p id="modalMessage" class="text-muted my-3"></p>
                
                <!-- กล่องสรุปผลแบบเรียบร้อยเป็นทางการ -->
                <div id="modalSummaryBox" class="summary-box text-start d-none mb-4">
                    <p class="mb-2"><strong><i class="fa-solid fa-school me-2"></i>หน่วยงาน :</strong> <span id="sumSchool" class="text-dark"></span></p>
                    <p class="mb-2"><strong><i class="fa-solid fa-user me-2"></i>ชื่อผู้ส่ง :</strong> <span id="sumName" class="text-dark"></span></p>
                    <p class="mb-0"><strong><i class="fa-solid fa-user-tie me-2"></i>ตำแหน่ง :</strong> <span id="sumPosition" class="text-dark"></span></p>
                </div>
                
                <!-- ปุ่มสำหรับปิดป๊อปอัพ -->
                <button type="button" class="btn btn-dark px-4 py-2" data-bs-dismiss="modal" style="border-radius: 6px; font-weight: 500;">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 🔴 ข้อมูล URL เว็บแอปของ Google Apps Script ที่เชื่อมโยงสำเร็จในชีทของคุณ
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxY0AMZkuCJlRLHYKy4mmp_JX1MjwRkmWsc0jGg8M9z3yVciSKCqgCDpVv69Zd9BUp4/exec";

    // จัดการตรวจจับการกดปุ่มส่งข้อมูลและการกรอกที่ถูกต้อง
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = e.target;
        const submitBtn = document.getElementById('submitBtn');
        
        // 1. ตรวจเช็คข้อมูล: หากกรอกไม่ครบตามเงื่อนไข (Validation) ระบบจะขึ้นคำเตือน และไม่ส่งข้อมูล
        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            return; 
        }
        
        // 2. หากข้อมูลสมบูรณ์ครบถ้วน: เริ่มล็อกหน้าจอและแสดงความเคลื่อนไหวการประมวลผล
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> กำลังส่งข้อมูล...';

        // จัดเตรียมชุดข้อมูลเป็น JSON Object 3 ฟิลด์หลักตามที่คุณต้องการ
        const formData = {
            school: document.getElementById('school').value.trim(),
            name: document.getElementById('name').value.trim(),
            position: document.getElementById('position').value.trim()
        };

        // ทำการยิงข้อมูลผ่าน Fetch API ไปยัง Google Sheets หลังบ้าน (GAS)
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // ตั้งค่า bypass เพื่อหลีกเลี่ยงข้อจำกัดของเบราว์เซอร์ (CORS policy บน GitHub Pages)
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(() => {
            // เมื่อส่งข้อมูลสำเร็จ: อัปเดตข้อมูลรายละเอียดทั้งหมดไปไว้บนสรุปการ์ด Pop-up
            document.getElementById('sumSchool').innerText = formData.school;
            document.getElementById('sumName').innerText = formData.name;
            document.getElementById('sumPosition').innerText = formData.position;

            // แสดงหน้าตาและแอนิเมชันของ Modal เมื่อทำรายการสำเร็จ
            document.getElementById('modalIcon').innerHTML = '<div class="modal-icon-success"><i class="fa-solid fa-circle-check"></i></div>';
            document.getElementById('modalTitle').className = "fw-bold text-success";
            document.getElementById('modalTitle').innerText = "บันทึกการส่งสำเร็จ!";
            document.getElementById('modalMessage').innerText = "ข้อมูลการตอบรับของท่านถูกจัดเก็บเข้าสู่ระบบเรียบร้อยแล้ว";
            document.getElementById('modalSummaryBox').classList.remove('d-none');

            // แสดงตัว Modal ขึ้นหน้าจอ
            const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            statusModal.show();
            
            // รีเซ็ตค่าในช่องข้อความทั้งหมดให้ว่างเปล่าสำหรับการกรอกของท่านถัดไป
            form.reset();
            form.classList.remove('was-validated');
            
            // ปลดบล็อกและเปลี่ยนข้อความปุ่มให้กลับมาทำงานปกติ
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ';
        })
        .catch(error => {
            console.error('Error:', error);
            
            // แสดงกรณีที่ระบบอินเทอร์เน็ตขัดข้อง หรือมีข้อผิดพลาดที่ไม่คาดคิด
            document.getElementById('modalIcon').innerHTML = '<div class="modal-icon-error"><i class="fa-solid fa-circle-exclamation"></i></div>';
            document.getElementById('modalTitle').className = "fw-bold text-danger";
            document.getElementById('modalTitle').innerText = "เกิดข้อผิดพลาดในการส่ง";
            document.getElementById('modalMessage').innerText = "เครือข่ายขัดข้องหรือไม่สามารถเข้าถึงเซิร์ฟเวอร์ได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง";
            document.getElementById('modalSummaryBox').classList.add('d-none');

            const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            statusModal.show();
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ';
        });
    });
</script>
</body>
</html>
