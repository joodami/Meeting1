<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกการตอบรับ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f6f9;
            color: #333333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }
        .form-card {
            background: #ffffff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
        }
        .form-header {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }
        /* ปรับปรุง Input ให้กดง่ายในมือถือ และดูทันสมัย */
        .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid #ced4da;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        /* ปุ่มกดขนาดใหญ่ ชัดเจน */
        .btn-submit {
            padding: 0.85rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }
        /* สไตล์ของ Modal แจ้งเตือน */
        .modal-content {
            border: none;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .modal-icon-success {
            font-size: 4rem;
            color: #198754;
            margin-bottom: 1rem;
        }
        .modal-icon-error {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .summary-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0d6efd;
            border-radius: 6px;
            padding: 1rem;
            font-size: 0.95rem;
        }
        
        /* ปรับแต่งสำหรับหน้าจอมือถือขนาดเล็ก */
        @media (max-width: 576px) {
            .form-card {
                padding: 1.5rem;
                border-radius: 12px;
            }
            .form-header h2 {
                font-size: 1.5rem;
            }
            .form-label {
                font-size: 1rem;
            }
            .btn-submit {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-7">
            
            <div class="form-card">
                <div class="form-header text-center">
                    <h2 class="fw-bold text-primary mb-2"><i class="fa-solid fa-file-pen me-2"></i>ระบบบันทึกการตอบรับ</h2>
                    <p class="text-muted mb-0">กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องเพื่อบันทึกเข้าสู่ระบบ</p>
                </div>

                <form id="registrationForm" class="needs-validation" novalidate>
                    
                    <div class="mb-3">
                        <label for="school" class="form-label">โรงเรียน / หน่วยงาน</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-school"></i></span>
                            <input type="text" class="form-control" id="school" placeholder="ระบุชื่อโรงเรียน หรือหน่วยงานของท่าน" required>
                        </div>
                        <div class="invalid-feedback">กรุณากรอกชื่อโรงเรียน หรือหน่วยงาน</div>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">ชื่อ - นามสกุล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control" id="name" placeholder="ระบุชื่อ-นามสกุล (เช่น นายสมชาย ใจดี)" required>
                        </div>
                        <div class="invalid-feedback">กรุณากรอกชื่อ-นามสกุล</div>
                    </div>

                    <div class="mb-4">
                        <label for="position" class="form-label">ตำแหน่ง</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted"><i class="fa-solid fa-user-tie"></i></span>
                            <input type="text" class="form-control" id="position" placeholder="ระบุตำแหน่งหน้าที่การงาน" required>
                        </div>
                        <div class="invalid-feedback">กรุณากรอกตำแหน่ง</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-submit shadow-sm" id="submitBtn">
                        <i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center p-4">
                
                <div id="modalIcon"></div>
                
                <h4 id="modalTitle" class="fw-bold"></h4>
                <p id="modalMessage" class="text-muted my-3"></p>
                
                <div id="modalSummaryBox" class="summary-box text-start d-none mb-4">
                    <p class="mb-1"><strong><i class="fa-solid fa-school me-2 text-secondary"></i>หน่วยงาน:</strong> <span id="sumSchool"></span></p>
                    <p class="mb-1"><strong><i class="fa-solid fa-user me-2 text-secondary"></i>ผู้ส่ง:</strong> <span id="sumName"></span></p>
                    <p class="mb-0"><strong><i class="fa-solid fa-user-tie me-2 text-secondary"></i>ตำแหน่ง:</strong> <span id="sumPosition"></span></p>
                </div>
                
                <button type="button" class="btn btn-secondary px-4 py-2" data-bs-dismiss="modal" style="border-radius: 8px;">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 🔴 ข้อมูล URL เว็บแอปของ Google Apps Script ที่เชื่อมโยงสำเร็จในชีทของคุณ
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxY0AMZkuCJlRLHYKy4mmp_JX1MjwRkmWsc0jGg8M9z3yVciSKCqgCDpVv69Zd9BUp4/exec";

    // จัดการตรวจจับการกดปุ่มส่งข้อมูลและการกรอกที่ถูกต้อง
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = e.target;
        const submitBtn = document.getElementById('submitBtn');
        
        // 1. ตรวจเช็คข้อมูล: หากกรอกไม่ครบตามเงื่อนไข (Validation) ระบบจะขึ้นคำเตือน และไม่ส่งข้อมูล
        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            return; 
        }
        
        // 2. หากข้อมูลสมบูรณ์ครบถ้วน: เริ่มล็อกหน้าจอและแสดงความเคลื่อนไหวการประมวลผล
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> กำลังส่งข้อมูล...';

        // จัดเตรียมชุดข้อมูลเป็น JSON Object 3 ฟิลด์หลักตามที่คุณต้องการ
        const formData = {
            school: document.getElementById('school').value.trim(),
            name: document.getElementById('name').value.trim(),
            position: document.getElementById('position').value.trim()
        };

        // ทำการยิงข้อมูลผ่าน Fetch API ไปยัง Google Sheets หลังบ้าน (GAS)
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // ตั้งค่า bypass เพื่อหลีกเลี่ยงข้อจำกัดของเบราว์เซอร์ (CORS policy บน GitHub Pages)
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(() => {
            // เมื่อส่งข้อมูลสำเร็จ: อัปเดตข้อมูลรายละเอียดทั้งหมดไปไว้บนสรุปการ์ด Pop-up
            document.getElementById('sumSchool').innerText = formData.school;
            document.getElementById('sumName').innerText = formData.name;
            document.getElementById('sumPosition').innerText = formData.position;

            // แสดงหน้าตาและแอนิเมชันของ Modal เมื่อทำรายการสำเร็จ
            document.getElementById('modalIcon').innerHTML = '<div class="modal-icon-success"><i class="fa-solid fa-circle-check"></i></div>';
            document.getElementById('modalTitle').className = "fw-bold text-success";
            document.getElementById('modalTitle').innerText = "บันทึกการส่งสำเร็จ!";
            document.getElementById('modalMessage').innerText = "ข้อมูลการตอบรับของท่านถูกจัดเก็บเข้าสู่ระบบเรียบร้อยแล้ว";
            document.getElementById('modalSummaryBox').classList.remove('d-none');

            // แสดงตัว Modal ขึ้นหน้าจอ
            const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            statusModal.show();
            
            // รีเซ็ตค่าในช่องข้อความทั้งหมดให้ว่างเปล่าสำหรับการกรอกของท่านถัดไป
            form.reset();
            form.classList.remove('was-validated');
            
            // ปลดบล็อกและเปลี่ยนข้อความปุ่มให้กลับมาทำงานปกติ
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ';
        })
        .catch(error => {
            console.error('Error:', error);
            
            // แสดงกรณีที่ระบบอินเทอร์เน็ตขัดข้อง หรือมีข้อผิดพลาดที่ไม่คาดคิด
            document.getElementById('modalIcon').innerHTML = '<div class="modal-icon-error"><i class="fa-solid fa-circle-exclamation"></i></div>';
            document.getElementById('modalTitle').className = "fw-bold text-danger";
            document.getElementById('modalTitle').innerText = "เกิดข้อผิดพลาดในการส่ง";
            document.getElementById('modalMessage').innerText = "เครือข่ายขัดข้องหรือไม่สามารถเข้าถึงเซิร์ฟเวอร์ได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง";
            document.getElementById('modalSummaryBox').classList.add('d-none');

            const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            statusModal.show();
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ';
        });
    });
</script>
</body>
</html>
